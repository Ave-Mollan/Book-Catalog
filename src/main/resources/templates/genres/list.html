<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Genres</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <style>
        body { background: #1f2329; color: #e5e7eb; }
        .page { max-width: 820px; margin: 36px auto; background: #2a2f36; border: 1px solid #3f4752; border-radius: 18px; padding: 28px; box-shadow: 0 16px 34px rgba(0, 0, 0, .35); }
        .page, .page * { color: #ffffff; }
        .form-control, .btn { border-radius: 12px; }
        .form-control { background: #1f2329; border: 1px solid #4b5563; color: #e5e7eb; }
        .form-control::placeholder { color: #ffffff; opacity: .85; }
        .btn-success { background: #0f766e; border-color: #0f766e; }
        .btn-secondary { background: #4b5563; border-color: #4b5563; }
        .btn-danger { color: #ffffff; }
        .table { overflow: hidden; border-radius: 12px; --bs-table-bg: #2a2f36; --bs-table-color: #ffffff; --bs-table-striped-bg: #242a31; --bs-table-striped-color: #ffffff; --bs-table-hover-bg: #313844; --bs-table-hover-color: #ffffff; --bs-table-active-color: #ffffff; }
        .table td, .table th { color: #ffffff !important; }
        .table thead th { background: #374151; color: #f9fafb; border-bottom-color: #4b5563; }
    </style>
</head>
<body>
<div class="page">
    <h2>Genres</h2>
    <form action="/genres/save" method="post" class="d-flex gap-2 mb-4">
        <input type="text" name="name" class="form-control form-control-lg" placeholder="New genre name" required/>
        <button class="btn btn-success btn-lg">Add</button>
    </form>
    <table class="table table-striped">
        <thead class="table-dark">
        <tr>
            <th>#</th>
            <th>Genre</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="genre : ${genres}">
            <td th:text="${genre.id}"></td>
            <td th:text="${genre.name}"></td>
            <td>
                <form th:action="@{/genres/delete/{id}(id=${genre.id})}" method="post" style="display:inline">
                    <button class="btn btn-sm btn-danger" onclick="return confirm('Delete this genre?')">Delete</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
    <a href="/books" class="btn btn-secondary btn-lg">Back to Books</a>
</div>
</body>
</html>
