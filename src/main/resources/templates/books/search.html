<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Import from Open Library</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <style>
        body { background: #1f2329; color: #e5e7eb; }
        .card-wrap { max-width: 720px; margin: 36px auto; background: #2a2f36; border: 1px solid #3f4752; border-radius: 18px; padding: 28px; box-shadow: 0 16px 34px rgba(0, 0, 0, .35); }
        .card-wrap, .card-wrap * { color: #ffffff; }
        .form-control, .form-select, .btn { border-radius: 12px; }
        .form-control, .form-select { background: #1f2329; border: 1px solid #4b5563; color: #e5e7eb; }
        .form-control::placeholder { color: #ffffff; opacity: .85; }
        .form-select option { background: #1f2329; color: #ffffff; }
        .form-label { font-weight: 600; color: #e5e7eb; }
        .btn-primary { background: #0369a1; border-color: #0369a1; }
        .btn-secondary { background: #4b5563; border-color: #4b5563; }
    </style>
</head>
<body>
<div class="card-wrap">
    <h2>Import Book from Open Library</h2>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
    <form action="/books/import-openlibrary" method="post" class="mt-3">
        <div class="mb-3">
            <label class="form-label">Book title</label>
            <input type="text" name="title" class="form-control form-control-lg" placeholder="e.g. Dune" required/>
        </div>
        <div class="mb-3">
            <label class="form-label">Genre</label>
            <select name="genreId" class="form-select">
                <option value="">Select Genre</option>
                <option th:each="genre : ${genres}" th:value="${genre.id}" th:text="${genre.name}"></option>
            </select>
        </div>
        <button class="btn btn-primary btn-lg">Fetch</button>
        <a href="/books" class="btn btn-secondary btn-lg">Back</a>
    </form>
</div>
</body>
</html>
