<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Book Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <style>
        body { background: #1f2329; color: #e5e7eb; }
        .card-wrap { max-width: 780px; margin: 36px auto; background: #2a2f36; border: 1px solid #3f4752; border-radius: 18px; padding: 28px; box-shadow: 0 16px 34px rgba(0, 0, 0, .35); }
        .card-wrap, .card-wrap * { color: #ffffff; }
        .form-control, .form-select, .btn { border-radius: 12px; }
        .form-control, .form-select { background: #1f2329; border: 1px solid #4b5563; color: #e5e7eb; }
        .form-control::placeholder { color: #ffffff; opacity: .85; }
        .form-select option { background: #1f2329; color: #ffffff; }
        .form-label { font-weight: 600; color: #e5e7eb; }
        .btn-success { background: #0f766e; border-color: #0f766e; }
        .btn-secondary { background: #4b5563; border-color: #4b5563; }
    </style>
</head>
<body>
<div class="card-wrap">
    <h2 th:text="${book.id != null} ? 'Edit Book' : 'Add Book'"></h2>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
    <form action="/books/save" method="post" class="mt-3">
        <input type="hidden" name="id" th:value="${book.id}"/>
        <div class="mb-3">
            <label class="form-label">Title</label>
            <input type="text" name="title" class="form-control form-control-lg" th:value="${book.title}" required/>
        </div>
        <div class="mb-3">
            <label class="form-label">Publish Year</label>
            <input type="number" name="publishYear" class="form-control" th:value="${book.publishYear}"/>
        </div>
        <div class="mb-3">
            <label class="form-label">Author</label>
            <input type="text" name="author" class="form-control" th:value="${book.author}"/>
        </div>
        <div class="mb-3">
            <label class="form-label">Description</label>
            <textarea name="description" class="form-control" rows="4" th:text="${book.description}"></textarea>
        </div>
        <div class="mb-3">
            <label class="form-label">Cover URL</label>
            <input type="text" name="coverUrl" class="form-control" th:value="${book.coverUrl}"/>
        </div>
        <div class="mb-3">
            <label class="form-label">Rating</label>
            <input type="number" step="0.1" name="rating" class="form-control" th:value="${book.rating}"/>
        </div>
        <div class="mb-3">
            <label class="form-label">Genre</label>
            <select name="genreId" class="form-select">
                <option value="">Select Genre</option>
                <option th:each="genre : ${genres}" th:value="${genre.id}" th:text="${genre.name}" th:selected="${genre.id == book.genreId}"></option>
            </select>
        </div>
        <button type="submit" class="btn btn-success btn-lg">Save</button>
        <a href="/books" class="btn btn-secondary btn-lg">Cancel</a>
    </form>
</div>
</body>
</html>
